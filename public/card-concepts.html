<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartes Mythologie — Design grec antique</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0b08;
    color: #f0e6c8;
    font-family: 'Cinzel', serif;
    min-height: 100vh;
    padding: 48px 20px 80px;
  }

  h1 {
    text-align: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.5rem;
    color: #c9a227;
    letter-spacing: .2em;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    font-size: .72rem;
    color: #6a5a38;
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-bottom: 52px;
  }

  .cards-row {
    display: flex;
    flex-wrap: wrap;
    gap: 36px;
    justify-content: center;
    align-items: flex-start;
  }

  /* ═══════════════════════════════════════
     CARD
  ═══════════════════════════════════════ */
  .card {
    width: 272px;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 0 0 1px rgba(201,162,39,.35),
      0 0 0 3px rgba(0,0,0,.8),
      0 14px 52px rgba(0,0,0,.85),
      inset 0 1px 0 rgba(255,230,130,.12);
    background: #1a130a;
  }

  /* Category colour accent */
  .card[data-cat="dieu"]     { --gem-a:#7ac4ff; --gem-b:#1a6abf; --gem-c:#0d3d7a; --glow:rgba(90,174,255,.4);  }
  .card[data-cat="titan"]    { --gem-a:#80f0a0; --gem-b:#1f9e4a; --gem-c:#0d5c28; --glow:rgba(74,207,122,.4);  }
  .card[data-cat="heros"]    { --gem-a:#d0a0ff; --gem-b:#8040d0; --gem-c:#4a1a7a; --glow:rgba(176,122,239,.4); }
  .card[data-cat="creature"] { --gem-a:#ff9080; --gem-b:#c02020; --gem-c:#6a0d0d; --glow:rgba(224,80,80,.4);   }

  /* ── Top meander strip (outside portrait) ── */
  .card-strip {
    height: 18px;
    background: rgba(0,0,0,.55);
    border-bottom: 1px solid rgba(201,162,39,.4);
    overflow: visible;   /* gem peut dépasser */
    flex-shrink: 0;
    position: relative;
    z-index: 4;
  }
  .card-strip.bot {
    border-top: 1px solid rgba(201,162,39,.4);
    border-bottom: none;
    overflow: hidden;    /* bas n'a pas de gem */
  }
  .card-strip svg { display: block; width: 100%; height: 16px; margin-top: 1px; opacity: .7; }

  /* ── Portrait block — hauteur calée sur le ratio paysage 600×455 → 272×206 + marges ── */
  .portrait-block {
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
    height: 230px;
  }
  /* Couche de fond : image floutée/assombrie pour remplir l'espace */
  .portrait-backdrop {
    position: absolute;
    inset: -30px;
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
    filter: blur(24px) brightness(.35) saturate(.5);
  }
  /* Image principale : ratio préservé, centrée, sans blanc */
  .portrait-img {
    position: absolute;
    inset: 0;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center center;
    /* HQ : filtre léger */
    filter: brightness(.78) contrast(1.22) sepia(8%);
  }
  /* Crop de carte physique : contraste poussé */
  .portrait-img[data-q="crop"] {
    filter: brightness(.62) contrast(1.72) sepia(15%) saturate(1.3);
  }
  /* Dégradé plus court pour ne pas mordre sur l'image paysage */
  .portrait-block::after {
    height: 100px;
    background: linear-gradient(to top, rgba(10,7,3,.98) 0%, rgba(10,7,3,.55) 45%, transparent 100%);
  }
  /* Dégradé : image fond vers le noir sur toute la partie basse */
  .portrait-block::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 140px;
    background: linear-gradient(to top, rgba(10,7,3,.95) 0%, rgba(10,7,3,.5) 40%, transparent 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* ── Gem — incrustée dans la frise du haut ── */
  .gem-overlay {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    z-index: 6;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 32%, rgba(255,230,120,.15) 0%, transparent 55%),
      radial-gradient(circle at 50% 50%, rgba(14,9,3,.92) 30%, rgba(4,2,0,.98) 100%);
    box-shadow:
      0 0 0 1.5px rgba(201,162,39,.9),
      0 0 0 3px rgba(0,0,0,.7),
      0 0 12px var(--glow),
      inset 0 1px 0 rgba(255,230,100,.35),
      inset 0 -1px 0 rgba(0,0,0,.5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gem-overlay svg {
    filter: drop-shadow(0 0 3px var(--glow));
  }

  /* ── Bandeau nom — transparent en haut, sombre en bas ── */
  .name-band {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 62px;
    z-index: 3;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0 36px 10px;
    background: transparent;
  }
  /* Losanges décoratifs de part et d'autre */
  .name-band::before, .name-band::after {
    content: '◆';
    position: absolute;
    bottom: 12px;
    font-size: .55rem;
    color: rgba(201,162,39,.6);
  }
  .name-band::before { left: 12px; }
  .name-band::after  { right: 12px; }

  .card-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: #f5dfa0;
    letter-spacing: .08em;
    line-height: 1;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,.95), 0 0 20px rgba(201,162,39,.25);
  }

  /* ── Stats block ── */
  .stats-block {
    padding: 10px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    flex: 1;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 22px 1fr 38px;
    align-items: center;
    gap: 8px;
  }
  .stat-icon {
    font-size: .85rem;
    text-align: center;
    opacity: .75;
  }
  .stat-bar-wrap {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .stat-label {
    font-size: .52rem;
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(220,190,120,.5);
    line-height: 1;
  }
  .stat-track {
    height: 9px;
    background: rgba(0,0,0,.6);
    border-radius: 5px;
    border: 1px solid rgba(201,162,39,.18);
    overflow: hidden;
  }
  .stat-fill {
    height: 100%;
    border-radius: 5px;
  }
  .stat-val {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.15rem;
    text-align: right;
    line-height: 1;
  }
  /* Peak: glow overlay, color driven by JS */
  .stat-row.peak .stat-fill   { box-shadow: 0 0 10px var(--heat, rgba(200,200,200,.4)); }
  .stat-row.peak .stat-icon   { opacity: 1; filter: drop-shadow(0 0 4px var(--heat, rgba(200,200,200,.4))); }
  .stat-row.peak .stat-label  { color: rgba(255,255,255,.7); }

  /* ═══════════════════════════════════════
     CARD BACK — marbre SVG + Oméga gravé
  ═══════════════════════════════════════ */
  .card-back {
    width: 272px;
    height: 460px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(160,150,140,.5),
      0 0 0 3px rgba(0,0,0,.8),
      0 14px 52px rgba(0,0,0,.85);
    background: #ccc;
  }
  .back-marble-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
</style>
</head>

        <!-- Filtre lueur diffuse -->

          <feComposite in="SourceGraphic" in2="blur" operator="over"/>

        <!-- Filtre Oméga : ombre interne + éclat -->

<script>
const STOPS = [
  [0,   [255, 255, 255]],
  [12,  [160, 200, 255]],
  [25,  [ 50, 110, 255]],
  [42,  [  0, 210, 140]],
  [58,  [ 50, 210,  50]],
  [72,  [240, 230,   0]],
  [85,  [255, 120,   0]],
  [100, [255,   0,   0]],
]

function heatRGB(pct) {
  pct = Math.max(0, Math.min(100, pct))
  for (let i = 0; i < STOPS.length - 1; i++) {
    const [a, ca] = STOPS[i], [b, cb] = STOPS[i + 1]
    if (pct >= a && pct <= b) {
      const t = (b === a) ? 0 : (pct - a) / (b - a)
      return [
        Math.round(ca[0] + t * (cb[0] - ca[0])),
        Math.round(ca[1] + t * (cb[1] - ca[1])),
        Math.round(ca[2] + t * (cb[2] - ca[2])),
      ]
    }
  }
  return STOPS[STOPS.length - 1][1]
}

function rgba(pct, a) {
  const [r, g, b] = heatRGB(pct)
  return `rgba(${r},${g},${b},${a})`
}

document.querySelectorAll('.stat-row').forEach(row => {
  const fill = row.querySelector('.stat-fill')
  const val  = row.querySelector('.stat-val')
  if (!fill || !val) return
  const pct = parseFloat(fill.style.width) || 0
  fill.style.background = `linear-gradient(90deg, ${rgba(pct,.5)} 0%, ${rgba(pct,1)} 100%)`
  val.style.color = rgba(pct, 1)
  val.style.textShadow = `0 0 10px ${rgba(pct,.4)}, 0 1px 3px rgba(0,0,0,.9)`
  row.style.setProperty('--heat', rgba(pct, .45))
})
</script>
